manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: keebJP
      url-base: https://github.com/keebJP
    - name: kot149
      url-base: https://github.com/kot149
    - name: ssbb
      url-base: https://github.com/ssbb

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3-branch
      import: app/west.yml

    - name: zmk-pmw3610-driver
      remote: keebJP
      revision: main

    - name: zmk-mouse-gesture
      remote: kot149
      revision: v1

    - name: zmk-listeners
      remote: ssbb
      revision: v1

  self:
    path: config
